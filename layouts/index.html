<!DOCTYPE html>
<html>
<head>
    <title>HS Code Profit Engine - Data Radar</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">
    <h1>System Radar: 원자재(JSON) 직결 테스트</h1>
    <ul style="background: #f4f4f4; padding: 20px; border-radius: 8px;">
    {{ if .Site.Data.hscode }}
        <li style="color: green; font-weight: bold;">✅ 데이터 로드 성공 (데이터가 존재합니다)</li>
    {{ else }}
        <li style="color: red; font-weight: bold;">❌ 치명적 오류: data/hscode.json 파일을 찾을 수 없습니다!</li>
    {{ end }}
    </ul>
</body>
</html>
