baseURL = "https://appcaffeine1.github.io/hscode-profit-engine/"
title = "Global HS Code Arbitrage"
theme = ""

# CSV 데이터를 읽어 웹페이지로 변환하는 마법의 로직
[[cascade]]
  [cascade.build]
    render = "never"
  [cascade._target]
    path = "/data/**"

[module]
  [[module.mounts]]
    source = "data/hscode.csv"
    target = "content/hscode"
