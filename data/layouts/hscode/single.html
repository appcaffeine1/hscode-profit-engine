<!DOCTYPE html>
<html>
<head>
    <title>HS Code {{ .Params.hs_code }} Tax Calculator</title>
</head>
<body>
    <h1>HS Code: {{ .Params.hs_code }}</h1>
    <h2>Item: {{ .Params.description }}</h2>
    <p>Duty Rate: {{ .Params.base_rate }}% | VAT: {{ .Params.vat_rate }}%</p>

    <div style="border:1px solid black; padding:10px;">
        <h3>Landed Cost Calculator</h3>
        Value ($): <input type="number" id="val" value="1000"><br><br>
        <button onclick="calc()">Calculate</button>
        <p>Total Tax ($): <span id="result">0</span></p>
    </div>

    <br>
    <a href="https://your-cpa-link.com" style="background:blue; color:white; padding:10px;">[Ad] Save 80% on Global Payments</a>

    <script>
        function calc() {
            let v = document.getElementById('val').value;
            let duty = v * ({{ .Params.base_rate }} / 100);
            let vat = (Number(v) + duty) * ({{ .Params.vat_rate }} / 100);
            document.getElementById('result').innerText = (duty + vat).toFixed(2);
        }
    </script>
</body>
</html>
